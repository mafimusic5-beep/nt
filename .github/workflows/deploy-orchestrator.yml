name: Deploy orchestrator to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'emery vpn orchestrator/**'
      - '.github/workflows/deploy-orchestrator.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -p "${VPS_PORT:-22}" -i ~/.ssh/id_ed25519 "${VPS_USER:-root}@${VPS_HOST}" <<'EOF'
          set -euo pipefail
          cd /opt/emery
          GIT_SSH_COMMAND="ssh -i /root/.ssh/emery_deploy_key -o IdentitiesOnly=yes" git fetch origin main
          GIT_SSH_COMMAND="ssh -i /root/.ssh/emery_deploy_key -o IdentitiesOnly=yes" git reset --hard origin/main
          cd /opt/emery-orchestrator
          source .venv/bin/activate
          pip install -r requirements.txt
          alembic upgrade head
          systemctl restart emery-backend emery-bot
          systemctl is-active --quiet emery-backend
          systemctl is-active --quiet emery-bot
          EOF
